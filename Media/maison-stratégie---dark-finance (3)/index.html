<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maison Stratégie</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: '#0F172A',
              ink: '#1A1918',
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0F172A; /* Charcoal Base */
        color: #E2E8F0; /* Slate 200 for general text */
      }

      /* 
         TEXTURE CHARCOAL
         Fond sombre avec un grain subtil.
      */
      .charcoal-texture {
        background-color: #0F172A;
        background-image: 
          url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.3'/%3E%3C/svg%3E"),
          radial-gradient(circle at 50% 0%, rgba(30, 41, 59, 0.4) 0%, transparent 70%);
        background-blend-mode: overlay, normal;
        background-size: 200px 200px, 100% 100%;
        background-attachment: fixed;
      }

      /* 
         TEXTURE OR "RICH 3D" (Diagonale)
         C'est la version classique et luxueuse qui fonctionne le mieux.
      */
      .gold-texture {
        color: transparent;
        background-clip: text;
        -webkit-background-clip: text;
        background-color: #D4AF37;
        
        /* Dégradé Diagonal Riche */
        background-image: 
          url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.3' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.5'/%3E%3C/svg%3E"),
          linear-gradient(
            135deg,
            #B68D40 0%,    /* Ombre */
            #D4AF37 25%,   /* Or Moyen */
            #F4E095 50%,   /* Lumière (Or blanc) */
            #D4AF37 75%,   /* Or Moyen */
            #B68D40 100%   /* Ombre */
          );
        
        background-blend-mode: soft-light, normal;
        background-size: 200px 200px, 100% 100%;
        
        /* Ombres pour le volume */
        filter: 
          drop-shadow(1px 1px 0px #9C7C38)
          drop-shadow(2px 2px 0px #856625)
          drop-shadow(3px 5px 5px rgba(0, 0, 0, 0.4));
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
