services:
  maison-siranno:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_EMAILJS_SERVICE_ID=${VITE_EMAILJS_SERVICE_ID}
        - VITE_EMAILJS_TEMPLATE_ID=${VITE_EMAILJS_TEMPLATE_ID}
        - VITE_EMAILJS_PUBLIC_KEY=${VITE_EMAILJS_PUBLIC_KEY}
    container_name: maison-siranno
    restart: unless-stopped
    networks:
      - n8n_default
    labels:
      - "traefik.enable=true"

      # ── Routeur HTTPS ─────────────────────────────────────────────────────────
      - "traefik.http.routers.maison-siranno.rule=Host(`yoanndelaloy.com`) || Host(`www.yoanndelaloy.com`)"
      - "traefik.http.routers.maison-siranno.entrypoints=websecure"
      - "traefik.http.routers.maison-siranno.tls=true"
      - "traefik.http.routers.maison-siranno.tls.certresolver=mytlschallenge"

      # ── Redirect www → sans www ───────────────────────────────────────────────
      - "traefik.http.middlewares.maison-siranno-www.redirectregex.regex=^https://www\\.yoanndelaloy\\.com/(.*)"
      - "traefik.http.middlewares.maison-siranno-www.redirectregex.replacement=https://yoanndelaloy.com/$${1}"
      - "traefik.http.middlewares.maison-siranno-www.redirectregex.permanent=true"
      - "traefik.http.routers.maison-siranno.middlewares=maison-siranno-www"

      # ── Port interne du container ─────────────────────────────────────────────
      - "traefik.http.services.maison-siranno.loadbalancer.server.port=80"

networks:
  n8n_default:
    external: true
